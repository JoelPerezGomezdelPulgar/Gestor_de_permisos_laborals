services:
  # --- BACKEND (EXPRESS) ---
  backend:
    build:
      context: ./backend  
      dockerfile: Dockerfile
    ports:
      - "5100:5100"
    env_file:
      - ./backend/.env
    networks:
      - app-network

  # --- FRONTEND (ANGULAR) ---
  frontend:
    build:
      context: ./frontend 
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - app-network

# Red interna para que se comuniquen entre ellos
networks:
  app-network:
    driver: bridge