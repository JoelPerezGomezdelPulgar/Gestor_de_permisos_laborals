<div class="app-shell d-flex">
    <nav id="sidebar" class="sidebar bg-dark text-white d-flex flex-column">
        <div class="sidebar-header p-3 d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <i class="fa fa-calendar fa-lg me-2" aria-hidden="true"></i>
                @if(sidebarCollapsed) {
                <span class="brand">Leave Admin </span>
                }

            </div>
            <button class="btn btn-sm btn-outline-light d-md-none" (click)="toggleSidebar()"
                aria-label="Toggle sidebar">
                <i class="fa fa-bars"></i>
            </button>

        </div>
        <ul class="nav flex-column px-2">
            @if (role == 'admin') {
            <li class="nav-item">
                <a class="nav-link text-white d-flex align-items-center" routerLink="/admin">
                    <i class="fa fa-dashboard me-2"></i>
                    <span class="link-text">Admin Dashboard</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white d-flex align-items-center" routerLink="/user">
                    <i class="fa fa-users me-2"></i>
                    <span class="link-text">Users</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white d-flex align-items-center" routerLink="/permisos">
                    <i class="fa fa-calendar-check-o me-2"></i>
                    <span class="link-text">Permisos</span>
                </a>
            </li>
            }
        </ul>
    </nav>
    <div id="content" class="content flex-grow-1 d-flex flex-column">
        <header class="p-2 bg-light border-bottom navbar shifted d-flex justify-content-between align-items-center">
            <button class="btn btn-primary" id="sidebarToggle" (click)="toggleSidebar()">
                <i class="fa fa-bars"></i>
            </button>

            <div class="header-actions">
                @if (!username) {
                <button class="btn btn-primary" (click)="login()">Sign in</button>
                } @else {
                <div class="d-flex align-items-center gap-3">
                    <span class="text-dark fw-bold">
                        <i class="fa fa-user-circle me-1"></i> {{ username }}
                    </span>
                    <button class="btn btn-outline-danger btn-sm" (click)="logout()">
                        <i class="fa fa-sign-out"></i> Logoff
                    </button>
                </div>
                }
            </div>
        </header>
        <main class="p-3 flex-grow-1 overflow-auto">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
