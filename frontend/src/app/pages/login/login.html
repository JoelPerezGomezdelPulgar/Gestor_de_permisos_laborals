<div class="login-page">
	<div class="shape s1" aria-hidden="true"></div>
	<div class="shape s2" aria-hidden="true"></div>
	<div class="shape s3" aria-hidden="true"></div>

	<div class="card login-card fadeInUp">
		<div class="text-center mb-3">
			<div class="brand">Portal d'usuaris</div>
			<h2>Benvolgut de nou</h2>
			<p>Inicia sessió per accedir al teu panell de control</p>
		</div>

		<form autocomplete="on" [formGroup]="loginForm">
			<div class="mb-3">
				<label for="username" class="form-label text-white-50">Nom d'usuari</label>
				<input id="username" formControlName="username" name="username" type="text"
					class="form-control form-control-lg" placeholder="Introdueix el teu nom d'usuari" required>
			</div>

			<div class="mb-3">
				<label for="password" class="form-label text-white-50">Contrasenya</label>
				<input id="password" formControlName="password" name="password" type="password"
					class="form-control form-control-lg" placeholder="Introdueix la teva contrasenya" required>
			</div>

			<div class="d-grid mt-3">
				<button type="button" (click)="onLogin()" class="btn btn-primary btn-lg">
					<span>Inicia sessió</span>
				</button>
			</div>
			<div class="text-center mt-3 text-white-50 small">
				No tens compte? <a routerLink="/register" (click)="onRegister()" class="text-primary fw-bold"
					style="text-decoration: none">Crea un aquí</a>
			</div>
		</form>

		<div class="text-center mt-3 text-white-50 small">Has oblidat la contrasenya? <a style="text-decoration: none"
				href="/email-request">Contacta amb l'administrador.</a></div>
	</div>
</div>
